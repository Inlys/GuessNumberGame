<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 数字猜测游戏</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <h1>登录账户</h1>
                <p class="subtitle">欢迎回来</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="输入用户名"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="输入密码"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-login" id="submitBtn">
                        登录
                    </button>
                </form>

                <div class="register-link">
                    <p>没有账户? <a href="register.html">立即注册</a></p>
                </div>
            </div>

            <div class="login-image">
                <div class="image-placeholder">
                    <span class="large-emoji">🔐</span>
                    <p>安全登录</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 登录中...';

            try {
                const response = await apiPost('/auth/login', {
                    username,
                    password
                });

                saveAuth(response.token, username);
                showMessage('登录成功！', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                showMessage(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '登录';
            }
        });

        // Check if already logged in
        if (getToken()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
